<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Al-Hadi Goods Bilty System</title>

<link rel="stylesheet" href="./style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<div class="header">
  <h1>🚛 AL-HADI GOODS</h1>
  <p>Bilty Generator System</p>
</div>

<div class="container">

<!-- FORM -->
<div class="form">

  <input id="from" placeholder="From">
  <input id="to" placeholder="To">
  <input id="date" placeholder="Date">

  <input id="consignor" placeholder="Consignor">
  <input id="consignee" placeholder="Consignee">

  <input id="total" placeholder="Total Amount">
  <input id="advance" placeholder="Advance Amount">

  <button onclick="generate()">Generate Bilty</button>
  <button onclick="downloadPDF()">Download PDF</button>

</div>

<!-- PREVIEW -->
<div class="preview">

  <h3>Preview</h3>

  <div id="biltyBox">

    <h2 id="biltyNo"></h2>

    <p><b>From:</b> <span id="p_from"></span></p>
    <p><b>To:</b> <span id="p_to"></span></p>
    <p><b>Date:</b> <span id="p_date"></span></p>

    <p><b>Consignor:</b> <span id="p_consignor"></span></p>
    <p><b>Consignee:</b> <span id="p_consignee"></span></p>

    <p><b>Total:</b> <span id="p_total"></span></p>
    <p><b>Advance:</b> <span id="p_advance"></span></p>

    <h3>Payable: <span id="p_payable"></span></h3>

    <div id="qr"></div>

  </div>

</div>

</div>

<script src="./app.js"></script>

</body>
</html>
