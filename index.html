<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Al-Hadi Goods ERP Bilty</title>

<link rel="stylesheet" href="./style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<div class="header">
  <img src="assets/logo.png" class="logo">
  <h1>AL-HADI GOODS</h1>
  <p>ERP Bilty System</p>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="showTab('create')">Create Bilty</button>
  <button onclick="showTab('search')">Search Bilty</button>
</div>

<!-- CREATE -->
<div id="create" class="tab">

  <div class="container">

    <div class="form">

      <input id="from" placeholder="From">
      <input id="to" placeholder="To">
      <input id="date" placeholder="Date">

      <input id="consignor" placeholder="Consignor">
      <input id="consignee" placeholder="Consignee">

      <input id="total" placeholder="Total Amount">
      <input id="advance" placeholder="Advance Amount">

      <button onclick="generate()">Generate Bilty</button>
      <button onclick="downloadPDF()">Download PDF</button>

    </div>

    <div class="preview">

      <div id="biltyBox">

        <div class="erp-header">
          <img id="pdfLogo" src="assets/logo.png">
          <div>
            <h2>AL-HADI GOODS</h2>
            <p>Bilty Receipt</p>
          </div>
        </div>

        <hr>

        <h3 id="biltyNo"></h3>

        <table>
          <tr><td>From</td><td id="p_from"></td></tr>
          <tr><td>To</td><td id="p_to"></td></tr>
          <tr><td>Date</td><td id="p_date"></td></tr>
          <tr><td>Consignor</td><td id="p_consignor"></td></tr>
          <tr><td>Consignee</td><td id="p_consignee"></td></tr>
        </table>

        <table class="finance">
          <tr><td>Total</td><td id="p_total"></td></tr>
          <tr><td>Advance</td><td id="p_advance"></td></tr>
          <tr><td>Payable</td><td id="p_payable"></td></tr>
        </table>

        <div id="qr"></div>

      </div>

    </div>

  </div>
</div>

<!-- SEARCH -->
<div id="search" class="tab hidden">

  <input id="searchInput" placeholder="Enter Bilty No (AH-0001)">
  <button onclick="searchBilty()">Search</button>

  <div id="result"></div>

</div>

<script src="./app.js"></script>

</body>
</html>
