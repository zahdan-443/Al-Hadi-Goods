<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al-Hadi Goods ERP Bilty</title>

<link rel="stylesheet" href="./style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<div class="header">
  <img src="assets/logo.png" class="logo">
  <h1>AL-HADI GOODS</h1>
  <p>ERP Bilty System</p>
</div>

<div class="nav">
  <button onclick="showTab('create')">Create Bilty</button>
  <button onclick="showTab('search')">Search Bilty</button>
</div>

<!-- CREATE -->
<div id="create" class="tab active">

  <div class="grid">

    <!-- FORM -->
    <div class="card">

      <input id="from" placeholder="From">
      <input id="to" placeholder="To">
      <input id="date" placeholder="Date">

      <input id="consignor" placeholder="Consignor">
      <input id="consignee" placeholder="Consignee">

      <input id="total" placeholder="Total Amount">
      <input id="advance" placeholder="Advance Amount">

      <button onclick="generate()">Generate Bilty</button>
      <button onclick="downloadPDF()">Download PDF</button>

    </div>

    <!-- PREVIEW -->
    <div class="card">

      <div class="erp">

        <div class="erp-header">
          <img src="assets/logo.png">
          <div>
            <h2>AL-HADI GOODS</h2>
            <small>Bilty Receipt</small>
          </div>
        </div>

        <hr>

        <h3 id="biltyNo"></h3>

        <div class="row"><b>From:</b> <span id="p_from"></span></div>
        <div class="row"><b>To:</b> <span id="p_to"></span></div>
        <div class="row"><b>Date:</b> <span id="p_date"></span></div>
        <div class="row"><b>Consignor:</b> <span id="p_consignor"></span></div>
        <div class="row"><b>Consignee:</b> <span id="p_consignee"></span></div>

        <hr>

        <div class="row"><b>Total:</b> <span id="p_total"></span></div>
        <div class="row"><b>Advance:</b> <span id="p_advance"></span></div>
        <div class="row"><b>Payable:</b> <span id="p_payable"></span></div>

        <div id="qr"></div>

      </div>

    </div>

  </div>

</div>

<!-- SEARCH -->
<div id="search" class="tab">

  <div class="card full">

    <input id="searchInput" placeholder="Enter Bilty No (AH-0001)">
    <button onclick="searchBilty()">Search</button>

    <div id="result"></div>

  </div>

</div>

<script src="./app.js"></script>

</body>
</html>
